<div class="consent-banner" id="consent-banner" hidden>
  <div class="consent-banner__content">
    <p class="consent-banner__message">
      このサイトは、ユーザーの利便性向上を目的として、お使いのブラウザ内に情報を保存します。
    </p>
    <div class="consent-banner__actions">
      <button class="consent-banner__button consent-banner__button--accept" type="button">同意する</button>
      <button class="consent-banner__button consent-banner__button--decline" type="button">同意しない</button>
    </div>
  </div>
</div>
<script>
(function() {
  var CONSENT_KEY = 'ifr25ku:consent:accepted';

  function loadAccepted() {
    try {
      return JSON.parse(localStorage.getItem(CONSENT_KEY) ?? 'null');
    } catch (e) {
      return null;
    }
  }

  function saveAccepted(accepted) {
    try {
      localStorage.setItem(CONSENT_KEY, JSON.stringify(accepted));
    } catch (e) {}
  }

  window.ifr25ku.consent = window.ifr25ku.consent || {};
  window.ifr25ku.consent.accepted = loadAccepted();

  if (window.ifr25ku.consent.accepted !== null) {
    window.ifr25ku.events.dispatchEvent(new CustomEvent('consent-change'));
    return;
  }

  var banner = document.getElementById('consent-banner');
  if (!banner) return;

  banner.hidden = false;
  banner.querySelector('.consent-banner__button--accept').addEventListener('click', () => {
    saveAccepted(true);
    window.ifr25ku.consent.accepted = true;
    window.ifr25ku.events.dispatchEvent(new CustomEvent('consent-change'));
    banner.hidden = true;
  });
  banner.querySelector('.consent-banner__button--decline').addEventListener('click', () => {
    banner.hidden = true;
  });
})();
</script>
