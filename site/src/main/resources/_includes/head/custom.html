<!-- favicon -->
<link rel="icon" href="{{ '/assets/images/miragefairy_face_192.png' | relative_url }}" type="image/png" sizes="192x192">

<!-- ifr25ku -->
<script>
window.ifr25ku = window.ifr25ku || {};
window.ifr25ku.events = window.ifr25ku.events || new EventTarget();
window.ifr25ku.loadJson = window.ifr25ku.loadJson || function(key, defaultValue) {
  try {
    const item = localStorage.getItem(key);
    if (item === null) return defaultValue;
    return JSON.parse(item);
  } catch (e) {
    console.error(`Failed to load ${key} from localStorage:`, e);
    return defaultValue;
  }
};
window.ifr25ku.saveJson = window.ifr25ku.saveJson || function(key, value) {
  if (value == null) {
    try {
      localStorage.removeItem(key);
    } catch (e) {
      console.error(`Failed to remove ${key} from localStorage:`, e);
    }
  } else {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (e) {
      console.error(`Failed to save ${key} to localStorage:`, e);
    }
  }
};
window.ifr25ku.stripBaseUrl = window.ifr25ku.stripBaseUrl || function(pathOrUrl) {
  const BASE_URL = '{{ site.baseurl }}';
  if (BASE_URL && pathOrUrl.startsWith(BASE_URL)) return pathOrUrl.slice(BASE_URL.length);
  return pathOrUrl || '/';
};
</script>
